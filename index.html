<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reconance</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #e9e7e3;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 28px;
      color: #1f1f1f;
      font-family: "Open Sans", sans-serif;
    }

    .app-shell {
      width: min(1000px, 100%);
      background: #f8f5f0;
      border-radius: 18px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      position: relative;
      min-height: 92vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px;
      border-bottom: 1px solid #e5ddd1;
      background: rgba(255,255,255,0.55);
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(6px);
    }

    .left-top {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #d8bf99;
      color: #2c241d;
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.4px;
      cursor: pointer;
      font-family: "Open Sans", sans-serif;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #7c6a58;
    }

    .status-popover {
      position: absolute;
      top: 52px;
      left: 0;
      width: 240px;
      background: white;
      border: 1px solid #eadfce;
      border-radius: 16px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.12);
      padding: 12px;
      display: none;
      z-index: 30;
    }

    .status-popover.show {
      display: block;
    }

    .status-item {
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.35;
      margin-bottom: 6px;
      background: #f8f5f0;
      border: 1px solid transparent;
    }

    .status-item:last-child {
      margin-bottom: 0;
    }

    .status-item.active {
      border-color: #d8bf99;
      background: #efe4d2;
      font-weight: 700;
    }

    .hamburger {
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 12px;
      background: #ede7dd;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      padding: 0 10px;
      cursor: pointer;
    }

    .hamburger span {
      display: block;
      height: 3px;
      background: #111111;
      border-radius: 3px;
      width: 100%;
    }

    .main-area {
      padding: 22px;
      position: relative;
    }

    .sheet-container {
      background: white;
      border-radius: 14px;
      border: 1px solid #e5ddd1;
      min-height: 78vh;
      padding: 18px;
      position: relative;
      overflow: hidden;
    }

.pdf-viewer {
  width: 100%;
  height: 78vh;
  display: none;
  border: none;
  background: white;
}

    .empty-state {
      min-height: 72vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
    }

.brand-title {
  font-family: "Montserrat", sans-serif;
  font-size: clamp(42px, 7vw, 82px);
  font-weight: 600;
  color: #2f2a24;
  letter-spacing: 1px;
  margin-bottom: 10px;
  text-transform: uppercase;
}

    .brand-quote {
      font-size: 18px;
      color: #7c746c;
      margin-bottom: 28px;
      font-weight: 400;
    }

    .upload-main-btn {
      border: none;
      background: #d8bf99;
      color: #2d241c;
      padding: 16px 22px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: "Open Sans", sans-serif;
    }

    .upload-main-btn:hover {
      opacity: 0.95;
    }

    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1f1f1f;
      color: white;
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 10px 26px rgba(0,0,0,0.2);
      opacity: 0;
      pointer-events: none;
      transition: 0.25s ease;
      z-index: 100;
      font-family: "Open Sans", sans-serif;
    }

    .toast.show {
      opacity: 1;
    }

    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.18);
      display: none;
      z-index: 40;
    }

    .drawer-overlay.show {
      display: block;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: -360px;
      width: 340px;
      height: 100vh;
      background: #fcfaf7;
      box-shadow: -12px 0 24px rgba(0,0,0,0.12);
      transition: right 0.28s ease;
      z-index: 50;
      display: flex;
      flex-direction: column;
    }

    .drawer.show {
      right: 0;
    }

    .drawer-header {
      padding: 22px 20px 16px;
      border-bottom: 1px solid #e8dfd3;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

.drawer-header h2 {
  font-size: 18px;
  font-family: "Montserrat", sans-serif;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
}

    .close-btn {
      border: none;
      background: #ede7dd;
      border-radius: 10px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      font-size: 18px;
    }

    .drawer-content {
      padding: 18px 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow-y: auto;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: #6f675d;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .upload-label {
      display: block;
      background: #d8bf99;
      color: #2d241c;
      padding: 14px 16px;
      border-radius: 14px;
      text-align: center;
      font-weight: 700;
      cursor: pointer;
    }

    input[type="file"] {
      display: none;
    }

    .pdf-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .pdf-item {
      background: white;
      border: 1px solid #eadfce;
      border-radius: 14px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .pdf-name {
      font-size: 13px;
      font-weight: 700;
      word-break: break-word;
    }

    .pdf-actions {
      display: flex;
      gap: 8px;
    }

    .pdf-actions button {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 700;
      font-family: "Open Sans", sans-serif;
    }

    .select-btn {
      background: #ede7dd;
      color: #1f1f1f;
    }

    .remove-btn {
      background: #f3dddd;
      color: #8c2f2f;
    }

    .empty-text {
      font-size: 13px;
      color: #7a736b;
      line-height: 1.5;
    }

    .state-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .state-buttons button {
      border: none;
      background: #ede7dd;
      border-radius: 12px;
      padding: 12px 14px;
      text-align: left;
      cursor: pointer;
      font-weight: 700;
      font-family: "Open Sans", sans-serif;
    }

    @media (max-width: 900px) {
      body {
        padding: 12px;
      }

      .main-area {
        padding: 14px;
      }

      .drawer {
        width: 100%;
        max-width: 360px;
      }
    }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>

  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <h2>RECONANCE</h2>
      <button class="close-btn" onclick="closeDrawer()">×</button>
    </div>

    <div class="drawer-content">
      <div>
        <div class="section-title">Sheet music</div>
        <label class="upload-label" for="pdfUpload">Upload sheet music</label>
        <input type="file" id="pdfUpload" accept="application/pdf" multiple />
      </div>

      <div>
        <div class="section-title">Uploaded PDFs</div>
        <div class="pdf-list" id="pdfList"></div>
        <p class="empty-text" id="emptyText">No PDFs uploaded yet.</p>
      </div>

      <div>
        <div class="section-title">Prototype states</div>
        <div class="state-buttons">
          <button onclick="setState('idle')">Idle</button>
          <button onclick="setState('live')">Live</button>
          <button onclick="setState('listening')">Someone is listening</button>
        </div>
      </div>
    </div>
  </aside>

  <div class="app-shell" id="app">
    <div class="topbar">
      <div class="left-top">
        <button class="status-pill" onclick="toggleStatusPopover()">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusLabel">RESONANCE · Idle</span>
        </button>

        <div class="status-popover" id="statusPopover">
          <div class="status-item" id="stateIdle">
            Idle<br />
            <span style="font-weight:400;">Resonance is available but not yet live.</span>
          </div>
          <div class="status-item" id="stateLive">
            Live<br />
            <span style="font-weight:400;">The practice session is being transmitted live.</span>
          </div>
          <div class="status-item" id="stateListening">
            Someone is listening<br />
            <span style="font-weight:400;">Party 2 has created an active connection.</span>
          </div>
        </div>
      </div>

      <button class="hamburger" onclick="openDrawer()">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <div class="main-area">
      <div class="sheet-container">

        <embed id="pdfViewer" class="pdf-viewer" type="application/pdf" />

        <div class="empty-state" id="emptyState">
          <h1 class="brand-title">RECONANCE</h1>
          <p class="brand-quote">musical bridge between generations</p>
          <label class="upload-main-btn" for="pdfUpload">Upload sheet music</label>
        </div>
      </div>
    </div>
  </div>

  <script>
    const pdfUpload = document.getElementById("pdfUpload");
    const pdfList = document.getElementById("pdfList");
    const emptyText = document.getElementById("emptyText");
    const pdfViewer = document.getElementById("pdfViewer");
    const emptyState = document.getElementById("emptyState");
    const drawer = document.getElementById("drawer");
    const drawerOverlay = document.getElementById("drawerOverlay");
    const toast = document.getElementById("toast");
    const statusPopover = document.getElementById("statusPopover");
    const statusLabel = document.getElementById("statusLabel");
    const statusDot = document.getElementById("statusDot");

    const stateIdle = document.getElementById("stateIdle");
    const stateLive = document.getElementById("stateLive");
    const stateListening = document.getElementById("stateListening");

    let currentState = "idle";
    let uploadedPdfs = [];
    let currentPdfIndex = null;

    function openDrawer() {
      drawer.classList.add("show");
      drawerOverlay.classList.add("show");
    }

    function closeDrawer() {
      drawer.classList.remove("show");
      drawerOverlay.classList.remove("show");
    }

    function toggleStatusPopover() {
      statusPopover.classList.toggle("show");
    }

    document.addEventListener("click", function (e) {
      const leftTop = document.querySelector(".left-top");
      if (!leftTop.contains(e.target)) {
        statusPopover.classList.remove("show");
      }
    });

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");

      setTimeout(() => {
        toast.classList.remove("show");
      }, 2600);
    }

    function updateStatusUI() {
      stateIdle.classList.remove("active");
      stateLive.classList.remove("active");
      stateListening.classList.remove("active");

      if (currentState === "idle") {
        statusLabel.textContent = "RESONANCE · Idle";
        statusDot.style.background = "#7c6a58";
        stateIdle.classList.add("active");
      }

      if (currentState === "live") {
        statusLabel.textContent = "RESONANCE · Live";
        statusDot.style.background = "#cf3a3a";
        stateLive.classList.add("active");
      }

      if (currentState === "listening") {
        statusLabel.textContent = "RESONANCE · Listening";
        statusDot.style.background = "#a16a2f";
        stateListening.classList.add("active");
      }
    }

    function setState(state) {
      currentState = state;
      updateStatusUI();

      if (state === "live") {
        showToast("Resonance is live");
      }

      if (state === "listening") {
        showToast("Someone is listening");
      }
    }

    function renderPdfList() {
      pdfList.innerHTML = "";

      if (uploadedPdfs.length === 0) {
        emptyText.style.display = "block";
        return;
      }

      emptyText.style.display = "none";

      uploadedPdfs.forEach((pdf, index) => {
        const item = document.createElement("div");
        item.className = "pdf-item";

        item.innerHTML = `
          <div class="pdf-name">${pdf.name}</div>
          <div class="pdf-actions">
            <button class="select-btn" onclick="selectPdf(${index})">Open</button>
            <button class="remove-btn" onclick="removePdf(${index})">Remove</button>
          </div>
        `;

        pdfList.appendChild(item);
      });
    }

    function selectPdf(index) {
      const pdf = uploadedPdfs[index];
      if (!pdf) return;

      currentPdfIndex = index;
      pdfViewer.src = pdf.url;
      pdfViewer.style.display = "block";
      emptyState.style.display = "none";
      closeDrawer();
    }

    function removePdf(index) {
      if (!uploadedPdfs[index]) return;

      URL.revokeObjectURL(uploadedPdfs[index].url);
      uploadedPdfs.splice(index, 1);

      if (currentPdfIndex === index) {
        currentPdfIndex = null;
      } else if (currentPdfIndex > index) {
        currentPdfIndex--;
      }

      if (uploadedPdfs.length === 0) {
        pdfViewer.src = "";
        pdfViewer.style.display = "none";
        emptyState.style.display = "flex";
      } else if (currentPdfIndex === null) {
        selectPdf(0);
      } else {
        selectPdf(currentPdfIndex);
      }

      renderPdfList();
    }

    pdfUpload.addEventListener("change", function (event) {
      const files = Array.from(event.target.files || []);
      if (files.length === 0) return;

      files.forEach(file => {
        const url = URL.createObjectURL(file);
        uploadedPdfs.push({
          name: file.name,
          url: url
        });
      });

      renderPdfList();

      if (currentPdfIndex === null && uploadedPdfs.length > 0) {
        selectPdf(0);
      }

      event.target.value = "";
    });

    updateStatusUI();
  </script>
</body>
</html>
